name: Code Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: '3.10'
        environment-file: environment.yaml
        activate-environment: osint

    - name: Install linting tools
      shell: bash -l {0}
      run: |
        conda activate osint
        pip install black==26.3.1 flake8==7.1.1 mypy==1.17.1 pylint==3.3.8

    - name: Run Black (formatting check)
      shell: bash -l {0}
      run: |
        conda activate osint
        black --check --diff .
      continue-on-error: true

    - name: Run Flake8 (linting)
      shell: bash -l {0}
      run: |
        conda activate osint
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --max-complexity=12 --max-line-length=150 --statistics
      continue-on-error: true

    - name: Run MyPy (type checking)
      shell: bash -l {0}
      run: |
        conda activate osint
        mypy ingestion processing storage --ignore-missing-imports
      continue-on-error: true

    - name: Run Pylint (linting)
      shell: bash -l {0}
      run: |
        conda activate osint
        pylint ingestion processing storage dashboard
      continue-on-error: true