# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts = 
    --verbose
    --cov=processing.enrichment_consumer
    --cov=processing.entity_extractor
    --cov=processing.actor_data
    --cov=storage.snowflake_loader
    --cov=storage.ioc_loader
    --cov=ingestion.base_producer
    --cov=ingestion.news_producer
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=60

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning