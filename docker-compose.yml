services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zk-data:/var/lib/zookeeper

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on: [zookeeper]
    restart: on-failure
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data

  neo4j:
    image: neo4j:5.15
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j-data:/data

  weaviate:
    image: semitechnologies/weaviate:1.27.0
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      DEFAULT_VECTORIZER_MODULE: "none"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
    volumes:
      - weaviate-data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: >
      sh -c "
        echo 'Starting Ollama...' &&
        ollama serve &
        sleep 5 &&
        echo 'Pulling llama3:8b if missing...' &&
        ollama pull llama3:8b &&
        echo 'Ollama model ready.' &&
        wait
      "

  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect-data:/root/.prefect
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  flows:
    build: .
    restart: on-failure
    depends_on:
      - prefect-server
      - kafka
      - neo4j
      - weaviate
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      NEO4J_URI: bolt://neo4j:7687
      KAFKA_BOOTSTRAP: kafka:29092
      WEAVIATE_URL: http://weaviate:8080
    volumes:
      - ./logs:/app/logs

  rag-api:
    build: .
    restart: on-failure
    depends_on:
      weaviate:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      WEAVIATE_URL: http://weaviate:8080
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: llama3:8b
      RETRIEVE_K: 25
      ANALYSIS_K: 5
      DISPLAY_K: 10
      MIN_SIMILARITY: 0.45
      MAX_PER_SOURCE: 2
    volumes:
      - ./logs:/app/logs
    command: conda run -n osint python -m api.rag_api

  dashboard:
    build: .
    restart: on-failure
    depends_on:
      - rag-api
    ports:
      - "8501:8501"
    command: conda run -n osint streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  zk-data:
  kafka-data:
  neo4j-data:
  prefect-data:
  weaviate-data:
  ollama-data: